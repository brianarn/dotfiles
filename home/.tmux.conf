# Set prefix to ctrl-space, freeing up ctrl-a for shell line-start
set-option -g prefix C-Space
unbind-key C-b
unbind-key C-a
bind-key C-Space send-prefix

### Settings

# Reduce escape-time for snappy vi-mode switching
set-option -s escape-time 10

# Terminal identity (prefer tmux-256color, fallback to screen-256color)
if-shell 'infocmp -x tmux-256color >/dev/null 2>&1' \
  'set-option -g default-terminal "tmux-256color"' \
  'set-option -g default-terminal "screen-256color"'

# Truecolor support for common terminal types
set-option -as terminal-features ',xterm-256color:RGB,screen-256color:RGB,tmux-256color:RGB'

# Extended key sequences (CSI u) — forwards Shift+Enter etc. to apps
set-option -g extended-keys always
set-option -s extended-keys-format csi-u
set-option -as terminal-features ',xterm-256color:extkeys,tmux-256color:extkeys'

# Keep a lot of scrollback buffer
set-option -g history-limit 50000

# Increase display of messages to 4 seconds
set-option -g display-time 4000

# Refresh status more often
set-option -g status-interval 5

# Focus events where supported
set-option -g focus-events on

# Index windows and panes starting at 1
set-option -g base-index 1
set-window-option -g pane-base-index 1

# Automatically renumber windows
set-option -g renumber-windows on

# Vi mode for copy and status
set-window-option -g mode-keys vi
set-option -g status-keys vi

# Enable mouse support
set-option -g mouse on

# Highlight activity in status bar
set-window-option -g monitor-activity on

# Native clipboard integration (OSC 52)
set-option -g set-clipboard on

# Allow escape sequences to pass through to the terminal (images, etc.)
set-option -g allow-passthrough on

### Key Bindings

## General

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "Reloaded tmux.conf"

# Toggle last active window
bind-key C-Space last-window

## Windows

# Previous window
bind-key -r C-h select-window -t :-
# Next window
bind-key -r C-l select-window -t :+

## Panes

# Split pane left/right
unbind-key %
bind-key | split-window -h
# Split pane top/bottom
unbind-key '"'
bind-key - split-window -v

# Navigate panes (vim-style)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Resize panes (vim-style, repeatable)
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

## Copy mode (vim-style)

# Begin selection
bind-key -T copy-mode-vi v send -X begin-selection
# Select line
bind-key -T copy-mode-vi V send -X select-line
# Toggle rectangle selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
# Yank selection and exit copy mode
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel

### Status Bar

set-option -g status-left-length 50
set-option -g status-right-length 80
set-option -g status-justify left

# Prefix indicator: session name turns red when active
# (use spaces not commas in styles inside #{?} to avoid delimiter conflicts)
set-option -g status-left "#{?client_prefix,#[fg=colour1 bold],#[fg=colour2 bold]}[#S]#[default] #[fg=colour4]#I:#[fg=colour6]#P "
# Add hostname when over SSH
if-shell '[ -n "$SSH_CONNECTION" ]' \
  'set-option -g status-left "#{?client_prefix,#[fg=colour1 bold],#[fg=colour2 bold]}[#S]#[default] #[fg=colour3]@#H #[fg=colour4]#I:#[fg=colour6]#P "'

# Right: sync/zoom warnings, path, window count, battery, clock
set-option -g status-right ""
set-option -ag status-right "#{?pane_synchronized,#[fg=colour1 bold]SYNC #[default],}"
set-option -ag status-right "#{?window_zoomed_flag,#[fg=colour3 bold][Z] #[default],}"
# Path: run-shell expands $HOME at load time so tmux natively tracks pane path
run-shell "tmux set-option -ag status-right \"#[fg=colour8]#{s|$HOME|~|:pane_current_path} \""
set-option -ag status-right "#[fg=colour4]#{session_windows}W"
set-option -ag status-right "#(~/.dotfiles/scripts/tmux-battery.sh)"
set-option -ag status-right "#[default] #[fg=colour6]%d %b %R"

### Colors (base16/base24-adaptive, uses terminal palette)
# Slots colour0-colour8, colour15, colour16-colour21 are consistent across
# base16 and base24. Slots colour9-colour14 differ (base24 has distinct brights).
# colour0=bg  colour7=fg  colour8=muted  colour3=yellow/highlight
# colour4=blue  colour6=cyan  colour2=green  colour1=red

# Status bar
set-option -g status-style "bg=colour0,fg=colour7"

# Window name format
set-window-option -g window-status-format " #I:#W#F "
set-window-option -g window-status-current-format " #I:#W#F "
set-window-option -g window-status-separator ""

# Inactive window titles
set-window-option -g window-status-style "fg=colour8"

# Active window title (base0B green bg, consistent across base16/base24)
set-window-option -g window-status-current-style "bg=colour2,fg=colour0,bold"

# Activity and bell indicators
set-window-option -g window-status-activity-style "fg=colour3,bold"
set-window-option -g window-status-bell-style "fg=colour1,bold"

# Pane borders
set-option -g pane-border-style "fg=colour8"
set-option -g pane-active-border-style "fg=colour4"

# Messages and command prompt (base0A yellow, consistent across base16/base24)
set-option -g message-style "bg=colour3,fg=colour7,bold"
set-option -g message-command-style "bg=colour3,fg=colour7,bold"

# Copy mode selection
set-option -g mode-style "bg=colour3,fg=colour7"

# Pane number display
set-option -g display-panes-active-colour colour6
set-option -g display-panes-colour colour4

# Clock
set-window-option -g clock-mode-colour colour4
